<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD OS v∞.1</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      height:100vh;
      background:radial-gradient(circle at center,#001a33,#000);
      font-family:'Segoe UI',sans-serif;
      color:#0f0;
      overflow:hidden;
    }

    .phone{
      width:100%;
      max-width:400px;
      height:100vh;
      margin:auto;
      border:12px solid #111;
      border-radius:45px;
      position:relative;
      overflow:hidden;
      box-shadow:0 0 60px rgba(0,255,255,0.5);
    }

    .status-bar{
      height:44px;
      background:rgba(0,0,0,0.8);
      color:#0ff;
      display:flex;
      justify-content:space-between;
      padding:0 20px;
      align-items:center;
      font-size:14px;
    }

    .brands{
      position:absolute;
      top:60px;
      width:100%;
      text-align:center;
      font-size:11px;
      letter-spacing:6px;
      color:rgba(0,255,255,0.4);
      animation:scroll 20s linear infinite;
    }
    @keyframes scroll{
      0%{transform:translateX(100%)}
      100%{transform:translateX(-100%)}
    }

    .screen{
      height:calc(100% - 120px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:0 20px;
    }

    .logo{
      font-size:80px;
      margin-bottom:20px;
      animation:glow 3s infinite;
    }
    @keyframes glow{
      0%,100%{text-shadow:0 0 20px #0f0;}
      50%{text-shadow:0 0 60px #0ff;}
    }

    .progress{
      width:80%;
      height:10px;
      border:1px solid #0f0;
      border-radius:5px;
      overflow:hidden;
      background:#002200;
      margin-top:25px;
    }

    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#0f0,#0ff,#0088ff);
      animation:loading 30s linear forwards;
    }

    /* 30 sec boot animation */
    @keyframes loading{
      0%{width:0%}
      100%{width:100%}
    }

    .gode{
      position:absolute;
      bottom:140px;
      width:100%;
      text-align:center;
      font-size:48px;
      font-weight:bold;
      letter-spacing:10px;
      animation:pulse 2.5s infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:0.7}
      50%{opacity:1;transform:scale(1.07)}
    }

    .powered{
      position:absolute;
      bottom:90px;
      width:100%;
      text-align:center;
      font-size:16px;
      color:#0af;
    }

    .nav-bar{
      position:absolute;
      bottom:0;
      height:80px;
      width:100%;
      background:rgba(0,0,0,0.9);
      display:flex;
      justify-content:center;
      align-items:center;
      gap:60px;
    }
    .nav-icon{
      width:6px;
      height:35px;
      background:#333;
      border-radius:3px;
    }
    .nav-icon:nth-child(2){
      height:50px;
      background:#0f0;
    }

  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>∞ 100% ⚡</span>
    </div>

    <div class="brands">
      SAMSUNG • APPLE • TECNO • INFINIX • XIAOMI • OPPO • VIVO • HUAWEI • NOKIA • GOOGLE • REALME
    </div>

    <div class="screen">
      <div class="logo">∞ GOD ∞</div>
      <div id="loadingText" style="font-size:24px; margin:10px 0;">Booting AI System...</div>

      <div class="progress"><div class="bar"></div></div>

      <div style="color:#0ff; margin-top:25px;">
        Miracles loading…<br>
        Time left: <span id="countdown">30</span>s
      </div>
    </div>

    <div class="gode">G O D E</div>
    <div class="powered">Powered by AI</div>

    <div class="nav-bar">
      <div class="nav-icon"></div>
      <div class="nav-icon"></div>
      <div class="nav-icon"></div>
    </div>
  </div>

  <script>
    // Countdown ya 30 seconds
    let time = 30;
    const counter = document.getElementById("countdown");
    const text = document.getElementById("loadingText");

    const interval = setInterval(() => {
      time--;
      counter.textContent = time;

      if(time === 0){
        clearInterval(interval);
        text.textContent = "System Ready ✔";
      }
    }, 1000);
  </script>
</body>
</html>
